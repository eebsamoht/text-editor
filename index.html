<!DOCTYPE html>
<html>
<head>
    <meta name="description" content="A simple plain text document editor.">
    <meta charset="utf-8">

    <title>Text Editor</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar-container">
        <div id="toolbar">
            <div>
                <button id="saveButton" class="toolbarButton">Save</button>
                <input id="fileInput" type="file" style="display: none";></button>
                <label id="loadButton" class="toolbarButton">Load</label>
                <button id="newButton" class="toolbarButton">New</button>
            </div>
            <div id="docNameLabel" style="margin:0.25em; padding:0.25em; text-align:center;">
                new.txt
            </div>
            
        </div>
    </div>

    <div id="page-container">
        <textarea id="page" placeholder="What will you write next?"></textarea>
    </div>

    <script src="main.js"></script>
</body>
</html>
